<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366F1">
  <title>WordCards - 单词卡片记忆</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            primary: {
              50: '#EEF2FF',
              100: '#E0E7FF',
              200: '#C7D2FE',
              300: '#A5B4FC',
              400: '#818CF8',
              500: '#6366F1',
              600: '#4F46E5',
              700: '#4338CA',
              800: '#3730A3',
              900: '#312E81',
            },
            accent: {
              pink: '#EC4899',
              emerald: '#10B981',
              amber: '#F59E0B',
            }
          }
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    
    /* 动画 */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes flip { from { transform: rotateY(0deg); } to { transform: rotateY(180deg); } }
    
    .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
    .animate-slideUp { animation: slideUp 0.5s ease-out; }
    .animate-pulse { animation: pulse 2s infinite; }
    
    /* 卡片翻转 */
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
    
    /* 毛玻璃效果 */
    .glass {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .glass-dark {
      background: rgba(30, 30, 60, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    
    /* 渐变按钮 */
    .btn-gradient {
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      transition: all 0.3s ease;
    }
    .btn-gradient:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
    }
    
    /* 浮动按钮 */
    .fab {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      color: white;
      border: none;
      font-size: 28px;
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fab:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 15px 40px rgba(99, 102, 241, 0.5);
    }
    
    /* 学习卡片 */
    .flash-card {
      width: 100%;
      max-width: 380px;
      height: 320px;
      position: relative;
      cursor: pointer;
    }
    .flash-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }
    .flash-card.flipped .flash-card-inner {
      transform: rotateY(180deg);
    }
    .flash-card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    .flash-card-front {
      background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
    }
    .flash-card-back {
      background: linear-gradient(145deg, #6366F1 0%, #8B5CF6 100%);
      color: white;
      transform: rotateY(180deg);
    }
    
    /* 输入框样式 */
    .input-field {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid #E2E8F0;
      border-radius: 16px;
      font-size: 16px;
      transition: all 0.3s ease;
      background: #F8FAFC;
    }
    .input-field:focus {
      outline: none;
      border-color: #6366F1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
      background: white;
    }
    
    /* 选择框样式 */
    select {
      padding: 12px 16px;
      border: 2px solid #E2E8F0;
      border-radius: 12px;
      font-size: 14px;
      background: white;
      cursor: pointer;
    }
    select:focus {
      outline: none;
      border-color: #6366F1;
    }
    
    /* 进度环 */
    .progress-ring {
      transform: rotate(-90deg);
    }
    .progress-ring-circle {
      transition: stroke-dashoffset 0.5s ease;
    }
  </style>
</head>
<body class="min-h-screen">
  <div id="app" class="min-h-screen flex flex-col">
    
    <!-- 主页 -->
    <div id="home-page" class="page flex-1 flex flex-col">
      <!-- Header -->
      <header class="glass px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-purple-600 flex items-center justify-center text-white font-bold text-lg shadow-lg">
            W
          </div>
          <h1 class="text-xl font-bold text-gray-800">我的卡组</h1>
        </div>
        <button id="settings-btn" class="w-10 h-10 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-600 transition-all">
          <i class="fas fa-cog"></i>
        </button>
      </header>
      
      <!-- 内容区 -->
      <main class="flex-1 overflow-y-auto p-6 pb-24">
        <!-- 空状态 -->
        <div id="empty-state" class="flex flex-col items-center justify-center h-full text-center py-16 animate-fadeIn">
          <div class="w-24 h-24 rounded-full bg-gradient-to-br from-primary-100 to-purple-100 flex items-center justify-center mb-6">
            <i class="fas fa-layer-group text-4xl text-primary-500"></i>
          </div>
          <h2 class="text-2xl font-bold text-gray-800 mb-2">还没有卡组</h2>
          <p class="text-gray-500 mb-8 max-w-xs">创建你的第一个卡片组，开始记忆之旅</p>
          <button id="add-deck-btn-empty" class="btn-gradient px-8 py-4 rounded-xl text-white font-semibold shadow-lg">
            <i class="fas fa-plus mr-2"></i>创建卡组
          </button>
        </div>
        
        <!-- 卡组列表 -->
        <div id="deck-list" class="space-y-4">
          <!-- 动态生成 -->
        </div>
      </main>
      
      <!-- 悬浮按钮 -->
      <div class="fixed bottom-6 right-6">
        <button id="add-deck-btn" class="fab animate-pulse">
          <i class="fas fa-plus"></i>
        </button>
      </div>
    </div>

    <!-- 卡组详情页 -->
    <div id="deck-detail-page" class="page flex-1 flex flex-col">
      <header class="glass px-4 py-4 flex items-center gap-3">
        <button id="back-to-home" class="w-10 h-10 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-600 transition-all">
          <i class="fas fa-arrow-left"></i>
        </button>
        <h2 id="deck-title" class="text-lg font-bold text-gray-800 flex-1 truncate">卡组详情</h2>
        <button id="edit-deck-btn" class="w-10 h-10 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-600 transition-all">
          <i class="fas fa-edit"></i>
        </button>
      </header>
      
      <main class="flex-1 overflow-y-auto p-6 pb-28">
        <!-- 统计卡片 -->
        <div class="grid grid-cols-2 gap-4 mb-6">
          <div class="bg-white rounded-2xl p-5 shadow-lg border border-gray-100">
            <div class="text-4xl font-bold text-primary-600" id="total-cards">0</div>
            <div class="text-sm text-gray-500 mt-1">总卡片数</div>
          </div>
          <div class="bg-white rounded-2xl p-5 shadow-lg border border-gray-100">
            <div class="text-4xl font-bold text-emerald-500" id="studied-cards">0</div>
            <div class="text-sm text-gray-500 mt-1">已学习</div>
          </div>
        </div>
        
        <!-- 卡片列表 -->
        <div id="card-list" class="space-y-3">
          <!-- 动态生成 -->
        </div>
      </main>
      
      <!-- 底部按钮 -->
      <div class="fixed bottom-6 left-6 right-6 flex gap-3">
        <button id="study-btn" class="flex-1 btn-gradient py-4 rounded-xl text-white font-semibold shadow-lg flex items-center justify-center gap-2">
          <i class="fas fa-play"></i>开始学习
        </button>
        <button id="add-card-btn" class="fab">
          <i class="fas fa-plus"></i>
        </button>
      </div>
    </div>

    <!-- 学习页 -->
    <div id="study-page" class="page flex-1 flex flex-col">
      <header class="glass px-4 py-4 flex items-center justify-between">
        <button id="exit-study" class="w-10 h-10 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-600">
          <i class="fas fa-times"></i>
        </button>
        <div class="flex items-center gap-3">
          <div class="w-3 h-3 rounded-full bg-primary-500"></div>
          <span id="study-progress" class="font-semibold text-gray-700">0 / 0</span>
        </div>
        <div class="w-10"></div>
      </header>
      
      <main class="flex-1 flex items-center justify-center p-6">
        <div id="flashcard" class="flash-card">
          <div class="flash-card-inner">
            <div class="flash-card-face flash-card-front">
              <span id="card-front-text" class="text-2xl font-semibold text-gray-800 text-center"></span>
            </div>
            <div class="flash-card-face flash-card-back">
              <span id="card-back-text" class="text-xl text-center"></span>
            </div>
          </div>
        </div>
      </main>
      
      <footer class="glass px-6 py-6 flex gap-4">
        <button id="btn-dont-know" class="flex-1 py-4 rounded-xl bg-red-100 hover:bg-red-200 text-red-600 font-semibold flex items-center justify-center gap-2 transition-all">
          <i class="fas fa-times"></i>不认识
        </button>
        <button id="btn-know" class="flex-1 py-4 rounded-xl bg-emerald-100 hover:bg-emerald-200 text-emerald-600 font-semibold flex items-center justify-center gap-2 transition-all">
          <i class="fas fa-check"></i>认识
        </button>
      </footer>
    </div>

    <!-- 设置页 -->
    <div id="settings-page" class="page flex-1 flex flex-col">
      <header class="glass px-4 py-4 flex items-center gap-3">
        <button id="back-from-settings" class="w-10 h-10 rounded-xl bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-600">
          <i class="fas fa-arrow-left"></i>
        </button>
        <h2 class="text-lg font-bold text-gray-800">设置</h2>
      </header>
      
      <main class="flex-1 overflow-y-auto p-6">
        <!-- 外观 -->
        <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden mb-6">
          <div class="px-5 py-4 bg-gray-50 border-b border-gray-100">
            <h3 class="font-semibold text-gray-700"><i class="fas fa-palette mr-2 text-primary-500"></i>外观</h3>
          </div>
          <div class="p-5 space-y-4">
            <div class="flex items-center justify-between">
              <span class="text-gray-600">主题</span>
              <select id="theme-select" class="rounded-xl border-gray-200">
                <option value="light">浅色</option>
                <option value="dark">深色</option>
              </select>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-gray-600">界面语言</span>
              <select id="language-select" class="rounded-xl border-gray-200">
                <option value="zh-CN">中文</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
              </select>
            </div>
          </div>
        </div>
        
        <!-- 数据 -->
        <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden mb-6">
          <div class="px-5 py-4 bg-gray-50 border-b border-gray-100">
            <h3 class="font-semibold text-gray-700"><i class="fas fa-database mr-2 text-primary-500"></i>数据</h3>
          </div>
          <div class="p-5 space-y-4">
            <div class="flex items-center justify-between">
              <span class="text-gray-600">导出数据</span>
              <button id="export-data-btn" class="px-4 py-2 bg-primary-100 text-primary-600 rounded-lg font-medium hover:bg-primary-200 transition-all">
                导出
              </button>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-gray-600">导入数据</span>
              <button id="import-data-btn" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-lg font-medium hover:bg-gray-200 transition-all">
                导入
              </button>
              <input type="file" id="import-file-input" accept=".json" style="display:none;">
            </div>
          </div>
        </div>
        
        <!-- 关于 -->
        <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
          <div class="px-5 py-4 bg-gray-50 border-b border-gray-100">
            <h3 class="font-semibold text-gray-700"><i class="fas fa-info-circle mr-2 text-primary-500"></i>关于</h3>
          </div>
          <div class="p-5">
            <div class="flex items-center justify-between">
              <span class="text-gray-600">版本</span>
              <span class="text-gray-400">v1.0.0</span>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- 创建卡组弹窗 -->
    <div id="deck-modal" class="modal fixed inset-0 bg-black/50 flex items-center justify-center p-6 z-50">
      <div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl animate-slideUp">
        <h3 id="deck-modal-title" class="text-xl font-bold text-gray-800 mb-5">创建卡组</h3>
        <input type="text" id="deck-name-input" placeholder="输入卡组名称" class="input-field" maxlength="50">
        <div class="flex gap-3 mt-6">
          <button id="cancel-deck-btn" class="flex-1 py-4 rounded-xl bg-gray-100 text-gray-600 font-semibold hover:bg-gray-200 transition-all">取消</button>
          <button id="save-deck-btn" class="flex-1 py-4 rounded-xl btn-gradient text-white font-semibold">保存</button>
        </div>
      </div>
    </div>

    <!-- 创建卡片弹窗 -->
    <div id="card-modal" class="modal fixed inset-0 bg-black/50 flex items-center justify-center p-6 z-50">
      <div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl animate-slideUp">
        <h3 id="card-modal-title" class="text-xl font-bold text-gray-800 mb-5">添加卡片</h3>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-2">正面（单词/问题）</label>
            <textarea id="card-front-input" class="input-field resize-none" rows="2" placeholder="输入单词或问题" maxlength="200"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-2">背面（解释/答案）</label>
            <textarea id="card-back-input" class="input-field resize-none" rows="3" placeholder="输入解释或答案" maxlength="500"></textarea>
          </div>
        </div>
        <div class="flex gap-3 mt-6">
          <button id="cancel-card-btn" class="flex-1 py-4 rounded-xl bg-gray-100 text-gray-600 font-semibold hover:bg-gray-200 transition-all">取消</button>
          <button id="save-card-btn" class="flex-1 py-4 rounded-xl btn-gradient text-white font-semibold">保存</button>
        </div>
      </div>
    </div>
    
  </div>

  <script src="js/app.js"></script>
</body>
</html>
